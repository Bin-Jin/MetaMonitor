<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMeta 站长授权管理中枢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: '#3b82f6', success: '#22c55e', danger: '#ef4444' } } } }
    </script>
    <style>
        body { background-color: #020617; background-image: radial-gradient(ellipse 80% 80% at 50% -20%, rgba(59, 130, 246, 0.15), rgba(255, 255, 255, 0)); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: linear-gradient(145deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.9) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(59, 130, 246, 0.5); background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }
        input:focus, select:focus { outline: none !important; border-color: var(--brand) !important; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .uid-tag { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); color: #60a5fa; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex items-center justify-center">

    <div id="toast-msg" class="fixed top-10 right-1/2 translate-x-1/2 z-[200] transform transition-all duration-300 -translate-y-20 opacity-0 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl font-bold flex items-center gap-3 pointer-events-none text-sm border border-slate-600">
        <span id="toast-text" class="tracking-wide">提示信息</span>
    </div>

    <div class="max-w-5xl w-full space-y-6">
        <!-- 后台顶部 -->
        <header class="glass-panel p-8 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl pointer-events-none"></div>
            <div class="flex items-center gap-4 relative z-10">
                <i class="ph-fill ph-shield-star text-4xl text-brand drop-shadow-[0_0_10px_rgba(59,130,246,0.6)]"></i>
                <div>
                    <h1 class="text-xl font-black italic tracking-tighter text-white uppercase">XMeta <span class="text-brand">Admin</span> Console</h1>
                    <p class="text-[10px] text-slate-400 font-mono tracking-widest mt-1 uppercase">超级管理员授权中枢</p>
                </div>
            </div>
            <div class="w-full md:w-auto flex flex-col gap-3 relative z-10">
                <input id="api-url" type="text" placeholder="直连推荐留空，或填 http://127.0.0.1:5000" class="w-full bg-[#020617]/50 border border-slate-700/50 rounded-xl px-4 py-2.5 text-xs text-white transition-colors">
                <div class="flex gap-2">
                    <input id="admin-secret" type="password" placeholder="请输入站长密码 (默认 admin888)" class="w-full bg-[#020617]/50 border border-slate-700/50 rounded-xl px-4 py-2.5 text-xs text-white font-mono transition-colors">
                    <button onclick="fetchCodes()" class="btn-gradient px-5 py-2.5 rounded-xl text-xs font-bold text-white shadow-lg shrink-0 whitespace-nowrap">连接后台</button>
                </div>
            </div>
        </header>

        <!-- 管理面板 -->
        <main id="manage-panel" class="glass-panel p-8 rounded-3xl opacity-50 pointer-events-none transition-opacity duration-300">
            
            <!-- 签发区域 -->
            <div class="bg-slate-800/40 border border-slate-700/50 rounded-3xl p-6 mb-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-brand/5 rounded-full blur-3xl pointer-events-none -translate-y-1/2 translate-x-1/4"></div>
                <h3 class="text-sm font-black text-white mb-5 flex items-center gap-2 relative z-10"><i class="ph-fill ph-magic-wand text-brand"></i> 签发新授权码</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 relative z-10">
                    <input id="new-code" type="text" placeholder="授权码 (如: VIP999)" class="bg-[#020617]/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm text-white font-mono uppercase focus:border-brand transition-colors">
                    <input id="new-remark" type="text" placeholder="备注 (如: 杭州王总)" class="bg-[#020617]/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm text-white focus:border-brand transition-colors">
                    <select id="new-expire" class="bg-[#020617]/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm text-white focus:border-brand cursor-pointer transition-colors appearance-none">
                        <option value="7">有效期: 7 天</option>
                        <option value="30" selected>有效期: 1 个月</option>
                        <option value="90">有效期: 3 个月</option>
                        <option value="365">有效期: 1 年</option>
                        <option value="-1">有效期: 永久</option>
                    </select>
                    <button onclick="addCode()" class="bg-success/20 text-success hover:bg-success hover:text-white border border-success/30 rounded-xl px-4 py-3 text-sm font-black transition-all shadow-md">确认签发</button>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-5 pb-5 border-b border-slate-700/50">
                <div>
                    <h2 class="text-lg font-black text-white flex items-center gap-2"><i class="ph-fill ph-key text-brand"></i> 下发的授权清单</h2>
                    <p class="text-xs text-slate-400 mt-1">您可以查看每个码绑定的 UID，或在必要时重置绑定。</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-2 gap-5" id="codes-list">
                <div class="col-span-full text-center text-slate-500 text-sm py-10 italic">请先在上方输入密码并连接后台</div>
            </div>
        </main>
    </div>

    <!-- 弹窗容器 -->
    <div id="modal-overlay" class="fixed inset-0 z-[999] bg-black/60 backdrop-blur-sm hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div id="modal-content" class="bg-[#0f172a] border border-slate-700/50 p-6 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300">
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let toastTimeout;
        let pendingAction = null;

        window.onload = () => {
            const savedUrl = localStorage.getItem('xmeta_admin_url');
            const savedSecret = localStorage.getItem('xmeta_admin_secret');
            if(savedUrl) document.getElementById('api-url').value = savedUrl;
            if(savedSecret) document.getElementById('admin-secret').value = savedSecret;
        };

        function showToast(msg, isError=false) {
            const toast = document.getElementById('toast-msg');
            document.getElementById('toast-text').innerText = msg;
            toast.className = `fixed top-10 right-1/2 translate-x-1/2 z-[200] transform transition-all duration-300 translate-y-0 opacity-100 ${isError?'bg-danger':'bg-success'} text-white px-6 py-3 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] font-bold flex items-center gap-3 text-sm border ${isError?'border-red-400/30':'border-green-400/30'}`;
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.replace('translate-y-0', '-translate-y-20'); toast.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }

        async function fetchCodes() {
            let urlInput = document.getElementById('api-url').value.trim();
            let url = urlInput ? urlInput.replace(/\/$/, "") : "http://127.0.0.1:5000";
            const secret = document.getElementById('admin-secret').value.trim();
            if(!secret) return showToast("站长密码不能为空！", true);
            localStorage.setItem('xmeta_admin_url', urlInput);
            localStorage.setItem('xmeta_admin_secret', secret);

            try {
                const res = await fetch(`${url}/admin/auth_codes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'cpolar-skip-browser-warning': 'true', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ admin_secret: secret })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    document.getElementById('manage-panel').classList.remove('opacity-50', 'pointer-events-none');
                    renderCodes(result.data);
                    showToast("✅ 连接成功！已同步授权与UID数据");
                } else { showToast(`⛔ 错误：${result.msg}`, true); }
            } catch (e) { showToast("⛔ 网络异常，建议直接使用本地 127.0.0.1 地址", true); }
        }

        function renderCodes(codes) {
            const list = document.getElementById('codes-list');
            if(codes.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center text-slate-500 text-sm py-10 italic">当前没有生效的授权码。</div>`;
                return;
            }
            
            list.innerHTML = codes.map(item => {
                const isPerm = item.expire_at === "2099-12-31 23:59:59";
                const dateDisplay = isPerm ? '永久有效' : item.expire_at.split(' ')[0];
                const uid = item.bound_uid || "";
                
                return `
                <div class="bg-slate-800/50 border ${item.is_expired ? 'border-danger/40 shadow-[0_0_15px_rgba(239,68,68,0.1)]' : 'border-slate-700/50 hover:bg-slate-800'} p-5 rounded-2xl flex flex-col gap-4 relative overflow-hidden group transition-all">
                    ${item.is_expired ? '<div class="absolute top-0 right-0 bg-danger text-white text-[10px] px-3 py-1 rounded-bl-xl font-bold shadow-md">已过期</div>' : ''}
                    
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <i class="ph-fill ph-ticket ${item.is_expired ? 'text-slate-500' : 'text-brand'} text-3xl"></i>
                            <div>
                                <span class="font-mono text-xl text-white font-black tracking-wider ${item.is_expired ? 'line-through text-slate-500' : ''}">${item.code}</span>
                                <p class="text-xs text-slate-400 font-bold">${item.remark || '未备注'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${uid ? `<button onclick="confirmAction('unbind', '${item.code}')" class="p-2.5 rounded-xl bg-blue-500/10 text-blue-400 border border-blue-500/20 hover:bg-blue-500 hover:text-white transition-all" title="重置UID绑定"><i class="ph-bold ph-arrows-counter-clockwise text-lg"></i></button>` : ''}
                            <button onclick="confirmAction('delete', '${item.code}')" class="p-2.5 rounded-xl bg-danger/10 text-danger border border-danger/20 hover:bg-danger hover:text-white transition-all" title="彻底吊销"><i class="ph-bold ph-trash text-lg"></i></button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 mt-1">
                        <div class="bg-[#020617]/50 rounded-xl p-3 border border-slate-700/30">
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">到期时间</p>
                            <span class="${item.is_expired ? 'text-danger' : 'text-slate-300'} text-xs font-mono font-bold">${dateDisplay}</span>
                        </div>
                        <!-- 🚀 核心优化：全宽展示，break-all 强制换行显示完整 UID -->
                        <div class="bg-[#020617]/50 rounded-xl p-3 border border-slate-700/30">
                            <div class="flex justify-between items-center mb-1">
                                <p class="text-[9px] text-slate-500 font-bold uppercase">绑定状态</p>
                                ${uid ? `<i class="ph ph-copy text-slate-500 cursor-pointer hover:text-white text-xs" onclick="copyToClipboard('${uid}')"></i>` : ''}
                            </div>
                            ${uid ? `
                                <div class="text-[10px] font-mono text-blue-400 font-bold break-all leading-relaxed">${uid}</div>
                            ` : `<span class="text-[10px] text-slate-600 font-bold italic">未激活 (等待首次连接)</span>`}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        async function addCode() {
            let urlInput = document.getElementById('api-url').value.trim();
            let url = urlInput ? urlInput.replace(/\/$/, "") : "http://127.0.0.1:5000";
            const secret = document.getElementById('admin-secret').value.trim();
            const code = document.getElementById('new-code').value.trim().toUpperCase(); 
            const remark = document.getElementById('new-remark').value.trim() || '未备注'; 
            const expireDays = parseInt(document.getElementById('new-expire').value);
            if(!code) return showToast("请输入授权码内容！", true);

            try {
                const res = await fetch(`${url}/admin/add_code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'cpolar-skip-browser-warning': 'true', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ admin_secret: secret, code: code, remark: remark, expire_days: expireDays })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    showToast(`✅ 已成功签发授权码: ${code}`);
                    document.getElementById('new-code').value = ''; document.getElementById('new-remark').value = '';
                    fetchCodes(); 
                } else { showToast(`⛔ 错误：${result.msg}`, true); }
            } catch (e) { showToast("网络异常", true); }
        }

        function confirmAction(type, code) {
            const overlay = document.getElementById('modal-overlay');
            const body = document.getElementById('modal-body');
            overlay.classList.remove('hidden'); overlay.classList.add('flex');
            
            const isDelete = type === 'delete';
            const title = isDelete ? '确认吊销授权码' : '确认重置UID绑定';
            const msg = isDelete ? `彻底删除授权码 [${code}]？<br>删除后该用户将永远无法再连接！` : `解绑授权码 [${code}] 的当前账号？<br>解绑后，该码可重新被新UID激活绑定。`;
            const btnClass = isDelete ? 'bg-danger hover:bg-red-600' : 'bg-blue-500 hover:bg-blue-600';
            const btnText = isDelete ? '确认吊销' : '确认解绑';

            body.innerHTML = `
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full ${isDelete?'bg-danger/20 text-danger':'bg-blue-500/20 text-blue-400'} flex items-center justify-center shrink-0">
                        <i class="ph-bold ${isDelete?'ph-warning-circle':'ph-arrows-counter-clockwise'} text-xl"></i>
                    </div>
                    <h3 class="text-lg font-black text-white">${title}</h3>
                </div>
                <p class="text-sm text-slate-400 mb-6 leading-relaxed">${msg}</p>
                <div class="flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-5 py-2.5 rounded-xl text-xs font-bold text-slate-300 bg-slate-800 hover:bg-slate-700 transition-colors">取消</button>
                    <button onclick="executeAction('${type}', '${code}')" class="px-5 py-2.5 rounded-xl text-xs font-bold text-white ${btnClass} transition-colors">${btnText}</button>
                </div>
            `;

            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                document.getElementById('modal-content').classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.add('opacity-0');
            document.getElementById('modal-content').classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }

        async function executeAction(type, code) {
            closeModal();
            let urlInput = document.getElementById('api-url').value.trim();
            let url = urlInput ? urlInput.replace(/\/$/, "") : "http://127.0.0.1:5000";
            const secret = document.getElementById('admin-secret').value.trim();
            const endpoint = type === 'delete' ? '/admin/delete_code' : '/admin/unbind_code';

            try {
                const res = await fetch(`${url}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'cpolar-skip-browser-warning': 'true', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ admin_secret: secret, code: code })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    showToast(`✅ 操作成功：${code}`);
                    fetchCodes(); 
                } else { showToast(`⛔ 错误：${result.msg}`, true); }
            } catch (e) { showToast("网络异常", true); }
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showToast("📋 UID已复制到剪贴板");
        }
    </script>
</body>
</html>
